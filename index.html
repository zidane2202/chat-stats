<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chat — Statistiques Descriptives</title>
<link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --chat--color--primary: #1ACEA0;
    --chat--color--primary-shade-50: #15b38a;
    --chat--color--secondary: #1ACEA0;
    --chat--color-secondary-shade-50: #15b38a;
    --chat--color-dark: #0d1b2a;
    --chat--color-light: #e2eaf4;
    --chat--header--background: #0d1b2a;
    --chat--header--color: #e2eaf4;
    --chat--message--bot--background: #1a2f44;
    --chat--message--bot--color: #e2eaf4;
    --chat--message--user--background: #1ACEA0;
    --chat--message--user--color: #0a1a10;
    --chat--body--background: #112031;
    --chat--footer--background: #0d1b2a;
    --chat--input--background: #1a2f44;
    --chat--input--text-color: #e2eaf4;
    --chat--window--width: 100%;
    --chat--window--height: 100%;
  }

  html, body {
    height: 100%;
    width: 100%;
    background: #0d1b2a;
    overflow: hidden;
    font-family: sans-serif;
  }

  /* Layout global : chat en haut, clavier en bas */
  #layout {
    display: flex;
    flex-direction: column;
    height: 100vh;
    width: 100%;
  }

  /* Le chat prend tout l'espace restant */
  #n8n-chat {
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }

  /* Forcer le widget à remplir son conteneur */
  #n8n-chat > div,
  #n8n-chat .n8n-chat,
  #n8n-chat .chat-window {
    width: 100% !important;
    height: 100% !important;
    max-width: 100% !important;
    border-radius: 0 !important;
    box-shadow: none !important;
    position: relative !important;
  }

  /* ── CLAVIER MATHÉMATIQUE ── */
  #math-bar {
    background: #0a1520;
    border-top: 1px solid rgba(26,206,160,0.2);
    padding: 8px 10px 10px;
    overflow-y: auto;
    max-height: 280px;
    display: none;
  }
  #math-bar.open { display: block; }

  .kbd-sections {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .kbd-section { display: flex; flex-direction: column; gap: 4px; }
  .kbd-label {
    font-size: 10px;
    color: #475569;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    font-family: sans-serif;
  }
  .kbd-row { display: flex; flex-wrap: wrap; gap: 4px; }

  .k {
    background: #1a2f44;
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 5px;
    color: #e2eaf4;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    padding: 5px 8px;
    cursor: pointer;
    transition: background 0.1s, color 0.1s, transform 0.07s;
    min-width: 32px;
    text-align: center;
    line-height: 1.3;
    user-select: none;
  }
  .k:hover  { background: #1ACEA0; color: #0a1a10; }
  .k:active { transform: scale(0.88); }
  .k.op   { color: #fbbf24; }
  .k.gr   { color: #93c5fd; }
  .k.stat { color: #1ACEA0; }
  .k.logic{ color: #f9a8d4; }

  /* Bouton flottant ∑ */
  #kbd-float-btn {
    position: fixed;
    bottom: 70px;
    right: 14px;
    z-index: 99999;
    background: #1a2f44;
    border: 1px solid rgba(26,206,160,0.5);
    border-radius: 8px;
    color: #1ACEA0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    width: 42px;
    height: 42px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    box-shadow: 0 2px 12px rgba(0,0,0,0.5);
  }
  #kbd-float-btn:hover { background: #1ACEA0; color: #0a1a10; }
</style>
</head>
<body>

<div id="layout">
  <!-- Widget n8n -->
  <div id="n8n-chat"></div>

  <!-- Clavier mathématique -->
  <div id="math-bar">
    <div class="kbd-sections">

      <div class="kbd-section">
        <div class="kbd-label">Opérations de base</div>
        <div class="kbd-row">
          <button class="k op" onclick="ins('+')">+</button>
          <button class="k op" onclick="ins('−')">−</button>
          <button class="k op" onclick="ins('×')">×</button>
          <button class="k op" onclick="ins('÷')">÷</button>
          <button class="k op" onclick="ins('=')"> = </button>
          <button class="k op" onclick="ins('≠')">≠</button>
          <button class="k op" onclick="ins('≈')">≈</button>
          <button class="k op" onclick="ins('±')">±</button>
          <button class="k op" onclick="ins('∓')">∓</button>
          <button class="k op" onclick="ins('·')">·</button>
        </div>
      </div>

      <div class="kbd-section">
        <div class="kbd-label">Comparaison & Ensembles</div>
        <div class="kbd-row">
          <button class="k" onclick="ins('≤')">≤</button>
          <button class="k" onclick="ins('≥')">≥</button>
          <button class="k" onclick="ins('<')">&lt;</button>
          <button class="k" onclick="ins('>')">&gt;</button>
          <button class="k" onclick="ins('≪')">≪</button>
          <button class="k" onclick="ins('≫')">≫</button>
          <button class="k" onclick="ins('∈')">∈</button>
          <button class="k" onclick="ins('∉')">∉</button>
          <button class="k" onclick="ins('⊂')">⊂</button>
          <button class="k" onclick="ins('⊃')">⊃</button>
          <button class="k" onclick="ins('⊆')">⊆</button>
          <button class="k" onclick="ins('⊇')">⊇</button>
          <button class="k" onclick="ins('∪')">∪</button>
          <button class="k" onclick="ins('∩')">∩</button>
          <button class="k" onclick="ins('∅')">∅</button>
          <button class="k" onclick="ins('ℝ')">ℝ</button>
          <button class="k" onclick="ins('ℕ')">ℕ</button>
          <button class="k" onclick="ins('ℤ')">ℤ</button>
        </div>
      </div>

      <div class="kbd-section">
        <div class="kbd-label">Statistiques & Analyse</div>
        <div class="kbd-row">
          <button class="k stat" onclick="ins('∑')">∑</button>
          <button class="k stat" onclick="ins('x̄')">x̄</button>
          <button class="k stat" onclick="ins('ȳ')">ȳ</button>
          <button class="k stat" onclick="ins('σ')">σ</button>
          <button class="k stat" onclick="ins('σ²')">σ²</button>
          <button class="k stat" onclick="ins('s²')">s²</button>
          <button class="k stat" onclick="ins('μ')">μ</button>
          <button class="k stat" onclick="ins('ν')">ν</button>
          <button class="k stat" onclick="ins('n')">n</button>
          <button class="k stat" onclick="ins('N')">N</button>
          <button class="k stat" onclick="ins('∏')">∏</button>
          <button class="k stat" onclick="ins('Me')">Me</button>
          <button class="k stat" onclick="ins('Mo')">Mo</button>
          <button class="k stat" onclick="ins('CV')">CV</button>
          <button class="k stat" onclick="ins('r')">r</button>
          <button class="k stat" onclick="ins('R²')">R²</button>
          <button class="k stat" onclick="ins('P(')">P(</button>
          <button class="k stat" onclick="ins('E(X)')">E(X)</button>
          <button class="k stat" onclick="ins('Var(X)')">Var(X)</button>
        </div>
      </div>

      <div class="kbd-section">
        <div class="kbd-label">Calcul & Fonctions</div>
        <div class="kbd-row">
          <button class="k" onclick="ins('∞')">∞</button>
          <button class="k" onclick="ins('√')">√</button>
          <button class="k" onclick="ins('∛')">∛</button>
          <button class="k" onclick="ins('∫')">∫</button>
          <button class="k" onclick="ins('∂')">∂</button>
          <button class="k" onclick="ins('∇')">∇</button>
          <button class="k" onclick="ins('lim')">lim</button>
          <button class="k" onclick="ins('log')">log</button>
          <button class="k" onclick="ins('ln')">ln</button>
          <button class="k" onclick="ins('exp')">exp</button>
          <button class="k" onclick="ins('|x|')">|x|</button>
          <button class="k" onclick="ins('⌊x⌋')">⌊x⌋</button>
          <button class="k" onclick="ins('⌈x⌉')">⌈x⌉</button>
          <button class="k" onclick="ins('!')">!</button>
          <button class="k" onclick="ins('C(n,k)')">Cₙₖ</button>
        </div>
      </div>

      <div class="kbd-section">
        <div class="kbd-label">Exposants & Indices</div>
        <div class="kbd-row">
          <button class="k" onclick="ins('²')">x²</button>
          <button class="k" onclick="ins('³')">x³</button>
          <button class="k" onclick="ins('⁴')">x⁴</button>
          <button class="k" onclick="ins('ⁿ')">xⁿ</button>
          <button class="k" onclick="ins('⁻¹')">x⁻¹</button>
          <button class="k" onclick="ins('⁻²')">x⁻²</button>
          <button class="k" onclick="ins('½')">½</button>
          <button class="k" onclick="ins('⅓')">⅓</button>
          <button class="k" onclick="ins('¼')">¼</button>
          <button class="k" onclick="ins('¾')">¾</button>
          <button class="k" onclick="ins('/')"> / </button>
          <button class="k" onclick="ins('xᵢ')">xᵢ</button>
          <button class="k" onclick="ins('x₁')">x₁</button>
          <button class="k" onclick="ins('x₂')">x₂</button>
          <button class="k" onclick="ins('fᵢ')">fᵢ</button>
        </div>
      </div>

      <div class="kbd-section">
        <div class="kbd-label">Lettres grecques</div>
        <div class="kbd-row">
          <button class="k gr" onclick="ins('α')">α</button>
          <button class="k gr" onclick="ins('β')">β</button>
          <button class="k gr" onclick="ins('γ')">γ</button>
          <button class="k gr" onclick="ins('Γ')">Γ</button>
          <button class="k gr" onclick="ins('δ')">δ</button>
          <button class="k gr" onclick="ins('Δ')">Δ</button>
          <button class="k gr" onclick="ins('ε')">ε</button>
          <button class="k gr" onclick="ins('ζ')">ζ</button>
          <button class="k gr" onclick="ins('η')">η</button>
          <button class="k gr" onclick="ins('θ')">θ</button>
          <button class="k gr" onclick="ins('λ')">λ</button>
          <button class="k gr" onclick="ins('Λ')">Λ</button>
          <button class="k gr" onclick="ins('π')">π</button>
          <button class="k gr" onclick="ins('Π')">Π</button>
          <button class="k gr" onclick="ins('ρ')">ρ</button>
          <button class="k gr" onclick="ins('σ')">σ</button>
          <button class="k gr" onclick="ins('Σ')">Σ</button>
          <button class="k gr" onclick="ins('τ')">τ</button>
          <button class="k gr" onclick="ins('φ')">φ</button>
          <button class="k gr" onclick="ins('Φ')">Φ</button>
          <button class="k gr" onclick="ins('χ')">χ</button>
          <button class="k gr" onclick="ins('χ²')">χ²</button>
          <button class="k gr" onclick="ins('ψ')">ψ</button>
          <button class="k gr" onclick="ins('ω')">ω</button>
          <button class="k gr" onclick="ins('Ω')">Ω</button>
        </div>
      </div>

      <div class="kbd-section">
        <div class="kbd-label">Logique & Divers</div>
        <div class="kbd-row">
          <button class="k logic" onclick="ins('∀')">∀</button>
          <button class="k logic" onclick="ins('∃')">∃</button>
          <button class="k logic" onclick="ins('⇒')">⇒</button>
          <button class="k logic" onclick="ins('⇔')">⇔</button>
          <button class="k logic" onclick="ins('¬')">¬</button>
          <button class="k logic" onclick="ins('∧')">∧</button>
          <button class="k logic" onclick="ins('∨')">∨</button>
          <button class="k" onclick="ins('→')">→</button>
          <button class="k" onclick="ins('←')">←</button>
          <button class="k" onclick="ins('↔')">↔</button>
          <button class="k" onclick="ins('∝')">∝</button>
          <button class="k" onclick="ins('∴')">∴</button>
          <button class="k" onclick="ins('∵')">∵</button>
          <button class="k" onclick="ins('°')">°</button>
          <button class="k" onclick="ins('%')">%</button>
          <button class="k" onclick="ins('‰')">‰</button>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Bouton flottant -->
<button id="kbd-float-btn" onclick="toggleKbd()" title="Clavier mathématique">∑</button>

<!-- n8n Chat Widget -->
<script type="module">
  import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';
  createChat({
    webhookUrl: 'https://promote1.app.n8n.cloud/webhook/9072b6e9-4f73-4360-bacd-b46c5af07615',
    target: '#n8n-chat',
    mode: 'fullscreen',
    showWelcomeScreen: false,
    chatInputKey: 'chatInput',
    chatSessionKey: 'sessionId',
    i18n: {
      en: {
        title: 'Hi there! 👋',
        subtitle: "Start a chat. We're here to help you 24/7.",
        footer: '',
        getStarted: 'Start Chatting',
        inputPlaceholder: 'Type your question..',
      },
    },
  });
</script>

<script>
  let kbdOpen = false;

  function toggleKbd() {
    kbdOpen = !kbdOpen;
    document.getElementById('math-bar').classList.toggle('open', kbdOpen);
    document.getElementById('kbd-float-btn').textContent = kbdOpen ? '✕' : '∑';
  }

  function ins(sym) {
    /* Cherche le textarea du widget n8n */
    const ta = document.querySelector('#n8n-chat textarea') 
            || document.querySelector('textarea') 
            || document.querySelector('[contenteditable="true"]');
    if (!ta) return;

    if (ta.tagName === 'TEXTAREA' || ta.tagName === 'INPUT') {
      const s = ta.selectionStart ?? ta.value.length;
      const e = ta.selectionEnd ?? ta.value.length;
      ta.value = ta.value.slice(0, s) + sym + ta.value.slice(e);
      ta.selectionStart = ta.selectionEnd = s + sym.length;
      ta.dispatchEvent(new Event('input', { bubbles: true }));
    } else {
      document.execCommand('insertText', false, sym);
    }
    ta.focus();
  }
</script>

</body>
</html>
